name: tracker
description: "Book Tracker - Track books, manage reading lists, and monitor progress."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local persistence
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # State management & architecture
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.2

  # UI & UX
  image_picker: ^1.1.2
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
